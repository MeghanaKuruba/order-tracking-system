server:
  port: 8080

spring:
  application:
    name: restaurant-service

  datasource:
    url: jdbc:h2:mem:authdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

    h2:
      console:
        enabled: true

    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info
