server:
  port: 8081
spring:
  application:
    name: auth-service
  security:
    user:
      name: admin
      password: admin

  datasource:
    url: jdbc:h2:mem:authdb
    username: sa
    password:
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

  logging:
    level:
      root: INFO
      com.ordertracking.auth: DEBUG

    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%thread] %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info
